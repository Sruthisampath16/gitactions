name: Linux Commands

on:
  push:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Show Date
        run: date

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la

      - name: Show User
        run: whoami

      - name: Show OS
        run: uname -a
